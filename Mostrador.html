<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mostrador - Farmacias Gi</title>
    
    <link rel="manifest" href="manifest-mostrador.json">
    <meta name="theme-color" content="#0a2551">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw-mostrador.js');
        });
      }
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f7f9; padding: 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(10,37,81,0.15); display: inline-block; width: 95%; max-width: 350px; border-top: 8px solid #0a2551; position: relative; }
        img.logo { width: 160px; margin-bottom: 10px; }
        h1 { color: #0a2551; font-size: 1.4rem; margin: 10px 0; }
        .turno-display { font-size: 4rem; font-weight: bold; color: #00bef3; margin: 15px 0; border: 3px solid #00bef3; padding: 10px; background: #e6f9ff; border-radius: 10px; }
        .btn-generar { background: #0a2551; color: white; border: none; padding: 18px; width: 100%; font-size: 1.2rem; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-generar:active { transform: scale(0.95); }
        .info-turno { font-weight: bold; color: #0a2551; margin-bottom: 5px; text-transform: uppercase; font-size: 0.85rem; }
        
        /* Botón de Reinicio */
        .btn-reiniciar { background: none; border: 1px solid #ccc; color: #999; padding: 8px 15px; font-size: 0.7rem; border-radius: 5px; cursor: pointer; margin-top: 25px; transition: 0.3s; text-transform: uppercase; }
        .btn-reiniciar:hover { border-color: #ff4757; color: #ff4757; background: #fff5f5; }
    </style>
</head>
<body>
    <div class="card">
        <img src="GI.png" alt="Farmacias Gi" class="logo">
        <h1>Emisión de Turnos</h1>
        <div id="turnoTipo" class="info-turno">Cargando horario...</div>
        <div id="ultimoTurno" class="turno-display">--</div>
        
        <button class="btn-generar" onclick="generarTurno()">OBTENER TURNO</button>
        
        <br>
        <button class="btn-reiniciar" onclick="confirmarReinicio()">Reiniciar turnos de hoy</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcNsMi4Nx8y1ogbZNUFPhaQyq5TknCLCw",
            authDomain: "conteo-alimentos-gb.firebaseapp.com",
            projectId: "conteo-alimentos-gb",
            databaseURL: "https://conteo-alimentos-gb-default-rtdb.firebaseio.com", 
            storageBucket: "conteo-alimentos-gb.firebasestorage.app",
            appId: "1:151719151096:web:0caf53f27e1edde6a4420d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function obtenerBloqueHorario() {
            const hora = new Date().getHours();
            return (hora < 14) ? "MATUTINO" : "VESPERTINO";
        }

        setInterval(() => {
            document.getElementById('turnoTipo').textContent = "TURNO " + obtenerBloqueHorario();
        }, 1000);

        function generarTurno() {
            const hoy = new Date().toISOString().split('T')[0];
            const bloque = obtenerBloqueHorario();
            const ref = db.ref('turnos_medicos');

            ref.once('value', snapshot => {
                let contador = 0;
                if (snapshot.exists()) {
                    const turnos = Object.values(snapshot.val());
                    // Filtramos por fecha, bloque y que NO estén cancelados/borrados
                    contador = turnos.filter(t => t.fecha === hoy && t.bloque === bloque && t.estado !== "REINICIADO").length;
                }
                
                const prefijo = (bloque === "MATUTINO" ? "M" : "V");
                const idTurno = prefijo + (contador + 1);

                ref.push({
                    numero: idTurno,
                    bloque: bloque,
                    fecha: hoy,
                    horaGenerado: new Date().toLocaleTimeString(),
                    estado: "ESPERA"
                }).then(() => {
                    document.getElementById('ultimoTurno').textContent = idTurno;
                });
            });
        }

        async function confirmarReinicio() {
            const pin = prompt("Para reiniciar los turnos de este bloque, escribe: SI");
            if (pin === "SI") {
                const hoy = new Date().toISOString().split('T')[0];
                const bloque = obtenerBloqueHorario();
                
                // Buscamos los turnos de este bloque para marcarlos como reiniciados
                const snapshot = await db.ref('turnos_medicos').orderByChild('fecha').equalTo(hoy).once('value');
                const datos = snapshot.val();
                
                if (datos) {
                    const actualizaciones = {};
                    Object.keys(datos).forEach(key => {
                        if (datos[key].bloque === bloque && datos[key].estado === "ESPERA") {
                            actualizaciones[`/turnos_medicos/${key}/estado`] = "REINICIADO";
                        }
                    });
                    
                    await db.ref().update(actualizaciones);
                    document.getElementById('ultimoTurno').textContent = "--";
                    alert("Turnos del bloque " + bloque + " reiniciados.");
                } else {
                    alert("No hay turnos activos para reiniciar.");
                }
            }
        }
    </script>
</body>
</html>
